<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Upload Movie</h2>

<input type="text" id="movieTitle" placeholder="Movie Title"><br><br>
<input type="file" id="movieFile"><br><br>

<button onclick="uploadMovie()">Upload</button>

<h2>Uploaded Movies</h2>
<ul id="movieList"></ul>

<script>
function uploadMovie() {
    let title = document.getElementById("movieTitle").value;
    let file = document.getElementById("movieFile").files[0];

    if (!title || !file) {
        alert("Fill all fields");
        return;
    }

    let movies = JSON.parse(localStorage.getItem("movies")) || [];

    movies.push({
        title: title,
        fileName: file.name
    });

    localStorage.setItem("movies", JSON.stringify(movies));

    alert("Movie uploaded!");
    loadMovies();
}

function loadMovies() {
    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    let list = document.getElementById("movieList");

    list.innerHTML = "";

    movies.forEach(m => {
        let li = document.createElement("li");
        li.textContent = m.title;
        list.appendChild(li);
    });
}

loadMovies();
</script>

</body>
</html>
